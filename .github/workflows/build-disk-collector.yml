name: Build Disk Collector Image

on:
  push:
    branches:
      - main
    paths:
      - 'install/sidecar-disk-collector/**'
      - '.github/workflows/build-disk-collector.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Semantic version to label the Docker image under (no "v" prefix, e.g. "1.2.3")'
        required: true
        type: string
      tag_latest:
        description: 'Also tag this image as :latest?'
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: Build disk-collector image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: install/sidecar-disk-collector
          push: true
          tags: |
            ghcr.io/flynnty/project-nomad-disk-collector:latest
            ${{ inputs.version && format('ghcr.io/flynnty/project-nomad-disk-collector:{0}', inputs.version) || '' }}
            ${{ inputs.version && format('ghcr.io/flynnty/project-nomad-disk-collector:v{0}', inputs.version) || '' }}
