name: Build Primary Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'admin/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/build-primary-image.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Semantic version to label the Docker image under (no "v" prefix, e.g. "1.2.3")'
        required: true
        type: string
      tag_latest:
        description: 'Also tag this image as :latest? (Keep false for RC and beta releases)'
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          push: true
          tags: |
            ghcr.io/flynnty/project-nomad:latest
            ${{ inputs.version && format('ghcr.io/flynnty/project-nomad:{0}', inputs.version) || '' }}
            ${{ inputs.version && format('ghcr.io/flynnty/project-nomad:v{0}', inputs.version) || '' }}
          build-args: |
            VERSION=${{ inputs.version }}
            BUILD_DATE=${{ github.event.workflow_run.created_at }}
            VCS_REF=${{ github.sha }}
