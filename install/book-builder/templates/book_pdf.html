<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ book_title }}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #0f0f0f; color: #e0e0e0; display: flex; flex-direction: column; height: 100vh; }
    .header { background: #1a1a1a; border-bottom: 1px solid #303030; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; gap: 12px; }
    .header-text h1 { font-size: 15px; margin-bottom: 2px; }
    .header-text p { font-size: 12px; color: #aaa; }
    .open-btn { flex-shrink: 0; background: #2d6a4f; color: #fff; padding: 8px 16px; border-radius: 6px; text-decoration: none; font-size: 13px; font-weight: bold; white-space: nowrap; }
    .open-btn:hover { background: #3a7a5f; }
    .viewer { flex: 1; }
    .viewer iframe { width: 100%; height: 100%; display: block; border: none; }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-text">
      <h1>{{ book_title }}</h1>
      <p>{{ author }}{% if description %} — {{ description[:120] }}{% if description|length > 120 %}…{% endif %}{% endif %}</p>
    </div>
    <a class="open-btn" id="open-btn" href="source.pdf">Open in browser</a>
  </div>
  <div class="viewer">
    <iframe src="source.pdf"></iframe>
  </div>
  <script>
    // Make "Open in browser" navigate the top-level window (breaking out of
    // Kiwix's iframe) so Chrome can render the PDF natively in a full tab.
    var pdfUrl = new URL('source.pdf', window.location.href).href;
    var btn = document.getElementById('open-btn');
    btn.href = pdfUrl;
    btn.addEventListener('click', function (e) {
      e.preventDefault();
      try { window.top.location.href = pdfUrl; } catch (_) { window.open(pdfUrl); }
    });
  </script>
</body>
</html>
