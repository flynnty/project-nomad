<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ book_title }}</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #0f0f0f; color: #e0e0e0; display: flex; flex-direction: column; height: 100vh; }
    .header { background: #1a1a1a; border-bottom: 1px solid #303030; padding: 12px 16px; flex-shrink: 0; }
    .header h1 { font-size: 16px; margin-bottom: 4px; }
    .header p { font-size: 13px; color: #aaa; }
    .viewer { flex: 1; position: relative; }
    .viewer iframe { width: 100%; height: 100%; display: block; border: none; }
    .open-btn {
      display: inline-block; margin-top: 16px;
      background: #2d6a4f; color: #fff; padding: 12px 24px;
      border-radius: 6px; text-decoration: none; font-size: 15px; font-weight: bold;
      cursor: pointer; border: none;
    }
    .open-btn:hover { background: #3a7a5f; }
    .fallback { display: none; flex-direction: column; align-items: center; justify-content: center;
                height: 100%; text-align: center; padding: 40px; }
    .fallback p { color: #aaa; margin-bottom: 8px; }
    .fallback a { color: #6ab4a0; }
  </style>
</head>
<body>
  <div class="header">
    <h1>{{ book_title }}</h1>
    <p>{{ author }}{% if description %} — {{ description[:120] }}{% if description|length > 120 %}…{% endif %}{% endif %}</p>
  </div>
  <div class="viewer" id="viewer">
    <iframe id="pdf-frame" src="source.pdf"></iframe>
    <div class="fallback" id="fallback">
      <p>Your browser cannot display this PDF inline.</p>
      <p style="margin-top:4px">Open it directly so the browser can render it natively:</p>
      <button class="open-btn" id="open-btn">Open PDF</button>
      <p style="margin-top:16px;font-size:12px">
        Or <a id="dl-link" href="source.pdf">download the file</a>.
      </p>
    </div>
  </div>
  <script>
    // Build the absolute URL to source.pdf so clicking "Open PDF" navigates
    // the top-level window (breaking out of Kiwix's iframe) and lets the
    // browser display the PDF natively.
    var pdfUrl = new URL('source.pdf', window.location.href).href;

    document.getElementById('dl-link').href = pdfUrl;

    document.getElementById('open-btn').addEventListener('click', function () {
      try { window.top.location.href = pdfUrl; } catch (e) { window.location.href = pdfUrl; }
    });

    // Show fallback if iframe fails to load the PDF (e.g. Chrome in iframe context).
    var frame = document.getElementById('pdf-frame');
    frame.addEventListener('error', showFallback);

    // Chrome doesn't fire 'error' for blocked PDF embeds; detect via load + blank content.
    frame.addEventListener('load', function () {
      try {
        // If iframe navigated to about:blank the PDF couldn't load
        if (!frame.contentDocument || frame.contentDocument.URL === 'about:blank') {
          showFallback();
        }
      } catch (e) {
        // Cross-origin error means iframe did load external content — leave it alone.
      }
    });


    function showFallback() {
      document.getElementById('pdf-frame').style.display = 'none';
      var fb = document.getElementById('fallback');
      fb.style.display = 'flex';
    }
  </script>
</body>
</html>
